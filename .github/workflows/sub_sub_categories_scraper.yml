name: QatarSale Sub Sub Categories Scraper

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  detect_subcats:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build_matrix.outputs.matrix }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install "scrapling[all]"
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Detect sub-categories and build matrix
        id: build_matrix
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          python << 'EOF'
          import json
          import os
          import time
          from scrapling import StealthyFetcher
          from detect_utils import get_subcategories, analyze_category_with_products

          MULTI_CATEGORIES = {
              "home_appliances":
                  "https://qatarsale.com/ar/products/home_appliances?basic_search:StatusFilter=0",
              "services":
                  "https://qatarsale.com/ar/products/services?basic_search:StatusFilter=0",
              "mobile_telephone_and_tablets":
                  "https://qatarsale.com/ar/products/mobile_telephone_and_tablets?basic_search:StatusFilter=0",
              "furniture_dcor":
                  "https://qatarsale.com/ar/products/furniture_dcor?basic_search:StatusFilter=0",
              "electronics":
                  "https://qatarsale.com/ar/products/electronics?basic_search:StatusFilter=0",
              "sportswear_equipment":
                  "https://qatarsale.com/ar/products/sportswear_equipment?basic_search:StatusFilter=0"
          }

          PAGES_PER_JOB = {
              "home_appliances":                 20,
              "services":                        20,
              "mobile_telephone_and_tablets":    20,
              "furniture_dcor":                  20,
              "electronics":                     20,
              "sportswear_equipment":            20
          }

          matrix = {"include": []}

          for category, base_url in MULTI_CATEGORIES.items():
              print(f"Detecting sub-categories for {category}...")
              try:
                  for attempt in range(3):
                      try:
                          subcats = get_subcategories(base_url)
                          if subcats:
                              break
                          print(f"  Attempt {attempt+1}: No sub-categories found, retrying...")
                          time.sleep(2)
                      except Exception as e:
                          print(f"  Attempt {attempt+1} failed: {e}")
                          time.sleep(2)
                  else:
                      print(f"  Failed to get subcats for {category} after 3 attempts")
                      continue
              except Exception as e:
                  print(f"Failed to get subcats for {category}: {e}")
                  continue

              print(f"  Found {len(subcats)} sub-categories")
              pages_per_job = PAGES_PER_JOB.get(category, 10)

              for subcat in subcats:
                  name = subcat["name"]
                  slug = subcat["slug"]
                  url  = subcat["url"] + "?basic_search:StatusFilter=0"

                  print(f"  Detecting pages for {name}...")
                  try:
                      last_page, has_products = analyze_category_with_products(url)
                  except Exception as e:
                      print(f"  Failed: {e}")
                      continue  

                  if not has_products:
                      print(f"    ⚠️ No products in {name}, skipping...")
                      continue

                  print(f"    {name}: {last_page} pages")

                  for i in range(0, last_page, pages_per_job):
                      start = i + 1
                      end   = min(i + pages_per_job, last_page)
                      matrix["include"].append({
                          "category":    category,
                          "subcat_name": name,
                          "subcat_slug": slug,
                          "subcat_url":  url,
                          "start":       start,
                          "end":         end,
                      })

          print(f"Total jobs: {len(matrix['include'])}")
          print(f"Matrix: {json.dumps(matrix, indent=2, ensure_ascii=False)}")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"matrix={json.dumps(matrix, ensure_ascii=False)}\n")
          EOF

  scrape_subcats:
    runs-on: ubuntu-latest
    needs: detect_subcats
    strategy:
      matrix: ${{ fromJson(needs.detect_subcats.outputs.matrix) }}
      fail-fast: false

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install "scrapling[all]" openpyxl
          playwright install chromium
          playwright install-deps chromium
          python -m patchright install chromium

      - name: Run scraper for sub-category pages
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python -u main.py \
            "${{ matrix.category }}" \
            "${{ matrix.subcat_slug }}" \
            ${{ matrix.start }} \
            ${{ matrix.end }} \
            "${{ matrix.subcat_url }}" \
            "${{ matrix.subcat_name }}"

      - name: Upload Excel artifact
        uses: actions/upload-artifact@v4
        with:
          name: multi-excel-${{ matrix.category }}-${{ matrix.subcat_slug }}-${{ matrix.start }}-${{ matrix.end }}
          path: |
            ${{ matrix.category }}_${{ matrix.subcat_slug }}_${{ matrix.start }}_${{ matrix.end }}.xlsx
            products_${{ matrix.category }}_${{ matrix.subcat_slug }}_${{ matrix.start }}_${{ matrix.end }}_failed.txt
          
  merge_subcats:
    runs-on: ubuntu-latest
    needs: scrape_subcats

    strategy:
      matrix:
        category:
          - home_appliances
          - services
          - mobile_telephone_and_tablets
          - furniture_dcor
          - electronics
          - sportswear_equipment

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pandas openpyxl boto3

      - name: Download artifacts for ${{ matrix.category }}
        uses: actions/download-artifact@v4
        with:
          pattern: multi-excel-${{ matrix.category }}-*
          merge-multiple: true
          path: excel_parts/

      - name: Merge sheets and upload
        env:
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT_URL: ${{ secrets.CF_R2_ENDPOINT_URL }}
          CF_R2_BUCKET_NAME: ${{ secrets.CF_R2_BUCKET_NAME }}
        run: |
          python << 'EOF'
          import pandas as pd
          import glob, os, boto3
          from datetime import datetime
          from r2_uploader import upload_final_batch_assets

          category = "${{ matrix.category }}"
          files = glob.glob('excel_parts/*.xlsx')

          if not files:
              print(f"No Excel files found for {category}")
              exit(0)

          all_sheets = {}
          for f in files:
              xl = pd.ExcelFile(f)
              for sheet in xl.sheet_names:
                  df = xl.parse(sheet)
                  if sheet in all_sheets:
                      all_sheets[sheet] = pd.concat([all_sheets[sheet], df], ignore_index=True)
                  else:
                      all_sheets[sheet] = df

          for sheet in all_sheets:
              all_sheets[sheet] = all_sheets[sheet].drop_duplicates(subset=['product_url'], keep='first')

          output_file = f"{category}.xlsx"
          with pd.ExcelWriter(output_file, engine="openpyxl") as writer:
              for sheet_name, df in all_sheets.items():
                  safe = sheet_name[:31].replace("/","-").replace("\\","-").replace("*","").replace("?","").replace("[","").replace("]","")
                  df.to_excel(writer, sheet_name=safe, index=False)
                  print(f"  Sheet '{safe}': {len(df)} rows")

          print(f"Excel saved: {output_file}")

          result = upload_final_batch_assets(
              images_folder="",
              final_excel=output_file,
              folder_name="qatarsale",
              category=category
          )
          print(f"Upload result: {result}")

          dt = datetime.now()
          client = boto3.client('s3',
              endpoint_url=os.environ['CF_R2_ENDPOINT_URL'],
              aws_access_key_id=os.environ['CF_R2_ACCESS_KEY_ID'],
              aws_secret_access_key=os.environ['CF_R2_SECRET_ACCESS_KEY'],
              region_name='auto'
          )
          bucket = os.environ['CF_R2_BUCKET_NAME']
          base_key = f"qatarsale/year={dt.year}/month={dt.strftime('%m')}/day={dt.strftime('%d')}/{category}/summary"

          # Summary
          summary_file = f"scrape_summary_{category}.txt"
          with open(summary_file, 'w', encoding='utf-8') as f:
              f.write(f"=== {category} ===\n")
              f.write(f"Run Date: {dt.strftime('%Y-%m-%d %H:%M:%S')} UTC\n")
              f.write(f"Status: DONE\n")
              f.write(f"Total Sheets: {len(all_sheets)}\n\n")
              for sheet, df in all_sheets.items():
                  total = len(df)
                  f.write(f"--- {sheet} ---\n")
                  f.write(f"Rows: {total}\n")
                  for col in df.columns:
                      missing = df[col].isna().sum() + (df[col] == '').sum()
                      pct = (missing / total) * 100 if total > 0 else 0
                      f.write(f"{col}: {missing} empty ({pct:.2f}%)\n")
                  f.write("\n")

          client.upload_file(summary_file, bucket, f"{base_key}/scrape_summary.txt",
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Summary uploaded: {base_key}/scrape_summary.txt")

          # Failed URLs
          failed = []
          for f in glob.glob('excel_parts/*_failed.txt'):
              with open(f, 'r', encoding='utf-8') as file:
                  for line in file:
                      line = line.strip()
                      if line.startswith('http'):
                          failed.append(line)

          failed_file = f"failed_urls_{category}.txt"
          with open(failed_file, 'w', encoding='utf-8') as f:
              f.write(f"=== {category} ===\n")
              f.write(f"Total Failed URLs: {len(failed)}\n\n")
              for u in failed:
                  f.write(u + '\n')

          client.upload_file(failed_file, bucket, f"{base_key}/failed_urls.txt",
              ExtraArgs={'ContentType': 'text/plain; charset=utf-8'})
          print(f"Failed URLs uploaded: {base_key}/failed_urls.txt")
          EOF
  